workflows:
  android-capacitor:
    name: Android Capacitor Build
    max_build_duration: 120
    instance_type: linux_x2
    environment:
      groups:
        - google_play
      node: 20
      java: 17
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Build web assets
        script: |
          npm run build
      - name: Sync Android platform
        script: |
          npx cap sync android
      - name: Set Android version and package
        script: |
          BUILD_GRADLE="$CM_BUILD_DIR/android/app/build.gradle"
          APP_NAME="RRHH PcPeli"
          PACKAGE_NAME="com.pcpeli.rrhh"
          VERSION_NAME="1.2.0"

          LATEST_BUILD=$(google-play get-latest-build-number --package-name "$PACKAGE_NAME" --tracks=internal 2>/dev/null || true)
          LATEST_BUILD=$(echo "$LATEST_BUILD" | tr -dc '0-9')

          if [ -n "$LATEST_BUILD" ] && [ "$LATEST_BUILD" -gt 0 ]; then
            VERSION_CODE=$((LATEST_BUILD + 1))
          else
            VERSION_CODE=$(date -u +%Y%m%d%H%M)
          fi

          sed -i "s/namespace \".*\"/namespace \"$PACKAGE_NAME\"/" "$BUILD_GRADLE"
          sed -i "s/applicationId \".*\"/applicationId \"$PACKAGE_NAME\"/" "$BUILD_GRADLE"
          sed -i "s/versionCode [0-9]\+/versionCode $VERSION_CODE/" "$BUILD_GRADLE"
          sed -i "s/versionName \".*\"/versionName \"$VERSION_NAME\"/" "$BUILD_GRADLE"

          STRINGS_FILE="$CM_BUILD_DIR/android/app/src/main/res/values/strings.xml"
          sed -i "s#<string name=\"package_name\">.*</string>#<string name=\"package_name\">$PACKAGE_NAME</string>#" "$STRINGS_FILE"
          sed -i "s#<string name=\"custom_url_scheme\">.*</string>#<string name=\"custom_url_scheme\">$PACKAGE_NAME</string>#" "$STRINGS_FILE"
          sed -i "s#<string name=\"app_name\">.*</string>#<string name=\"app_name\">$APP_NAME</string>#" "$STRINGS_FILE"
          sed -i "s#<string name=\"title_activity_main\">.*</string>#<string name=\"title_activity_main\">$APP_NAME</string>#" "$STRINGS_FILE"

          echo "Android VERSION_CODE=$VERSION_CODE"
          echo "Android VERSION_NAME=$VERSION_NAME"
      - name: Build Android App Bundle
        script: |
          cd android && ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/mapping.txt
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal

  ios-capacitor:
    name: iOS Capacitor Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.pcpeli.rrhh
      groups:
        - appstore_credentials
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      - name: Build web assets
        script: |
          npm run build
      - name: Add iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Set App Icon
        script: |
          ICON_SOURCE="$CM_BUILD_DIR/assets/icon-only.png"
          APPICONSET="$CM_BUILD_DIR/ios/App/App/Assets.xcassets/AppIcon.appiconset"
          
          echo "=== Icon source check ==="
          ls -la "$ICON_SOURCE"
          file "$ICON_SOURCE"
          
          mkdir -p "$APPICONSET"
          
          # Generate all required iOS icon sizes with verbose output
          for SIZE in 20 29 40 58 60 76 80 87 120 152 167 180 1024; do
            echo "Generating ${SIZE}x${SIZE}..."
            sips -z $SIZE $SIZE "$ICON_SOURCE" --out "$APPICONSET/icon-${SIZE}.png"
          done
          
          # Create Contents.json - use printf to avoid indentation issues
          printf '%s\n' '{"images":[{"filename":"icon-40.png","idiom":"iphone","scale":"2x","size":"20x20"},{"filename":"icon-60.png","idiom":"iphone","scale":"3x","size":"20x20"},{"filename":"icon-58.png","idiom":"iphone","scale":"2x","size":"29x29"},{"filename":"icon-87.png","idiom":"iphone","scale":"3x","size":"29x29"},{"filename":"icon-80.png","idiom":"iphone","scale":"2x","size":"40x40"},{"filename":"icon-120.png","idiom":"iphone","scale":"3x","size":"40x40"},{"filename":"icon-120.png","idiom":"iphone","scale":"2x","size":"60x60"},{"filename":"icon-180.png","idiom":"iphone","scale":"3x","size":"60x60"},{"filename":"icon-20.png","idiom":"ipad","scale":"1x","size":"20x20"},{"filename":"icon-40.png","idiom":"ipad","scale":"2x","size":"20x20"},{"filename":"icon-29.png","idiom":"ipad","scale":"1x","size":"29x29"},{"filename":"icon-58.png","idiom":"ipad","scale":"2x","size":"29x29"},{"filename":"icon-40.png","idiom":"ipad","scale":"1x","size":"40x40"},{"filename":"icon-80.png","idiom":"ipad","scale":"2x","size":"40x40"},{"filename":"icon-76.png","idiom":"ipad","scale":"1x","size":"76x76"},{"filename":"icon-152.png","idiom":"ipad","scale":"2x","size":"76x76"},{"filename":"icon-167.png","idiom":"ipad","scale":"2x","size":"83.5x83.5"},{"filename":"icon-1024.png","idiom":"ios-marketing","scale":"1x","size":"1024x1024"}],"info":{"author":"xcode","version":1}}' > "$APPICONSET/Contents.json"
          
          echo "=== Generated icon files ==="
          ls -la "$APPICONSET"
          echo "=== Contents.json ==="
          cat "$APPICONSET/Contents.json"
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod install
      - name: Auto-increment build number
        script: |
          LATEST_RAW=$(app-store-connect get-latest-testflight-build-number com.pcpeli.rrhh 2>/dev/null || true)
          LATEST=$(echo "$LATEST_RAW" | tr -dc '0-9')
          echo "Latest TestFlight build (raw): $LATEST_RAW"

          # If ASC lookup fails/returns empty, fallback to a unique UTC timestamp build number
          if [ -n "$LATEST" ] && [ "$LATEST" -gt 0 ]; then
            NEW_BUILD=$((LATEST + 1))
            echo "Using App Store Connect latest build + 1"
          else
            NEW_BUILD=$(date -u +%Y%m%d%H%M)
            echo "ASC lookup failed; using UTC timestamp fallback"
          fi

          # Safety floor
          if [ "$NEW_BUILD" -le 6 ]; then
            NEW_BUILD=7
          fi

          echo "Setting new build number to: $NEW_BUILD"
          
          PLIST="$CM_BUILD_DIR/ios/App/App/Info.plist"
          PBXPROJ="$CM_BUILD_DIR/ios/App/App.xcodeproj/project.pbxproj"
          
          # Method 1: PlistBuddy
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $NEW_BUILD" "$PLIST"
           /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.2.1" "$PLIST"
          
          # Method 2: sed on pbxproj - match any version format
          sed -i '' "s/CURRENT_PROJECT_VERSION = .*;/CURRENT_PROJECT_VERSION = $NEW_BUILD;/g" "$PBXPROJ"
          sed -i '' "s/MARKETING_VERSION = .*;/MARKETING_VERSION = 1.2.1;/g" "$PBXPROJ"
          
          # Method 3: agvtool (most reliable for Xcode)
          cd "$CM_BUILD_DIR/ios/App"
          agvtool new-version -all $NEW_BUILD || true
          agvtool new-marketing-version 1.2.1 || true
          
          # Verify all changes
          echo "=== Info.plist CFBundleVersion ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$PLIST"
          echo "=== Info.plist CFBundleShortVersionString ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$PLIST"
          echo "=== pbxproj CURRENT_PROJECT_VERSION ==="
          grep "CURRENT_PROJECT_VERSION" "$PBXPROJ" | head -5
          echo "=== agvtool what-version ==="
          agvtool what-version || true
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
